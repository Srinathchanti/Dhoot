<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fire & Ice — Staff Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root { --primary: #ff6b2b; --bg: #ffffff; --surface: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); }
.glass-card { background: white; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.input-field { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; outline: none; }
.input-field:focus { border-color: var(--primary); }
.shimmer-btn { background: linear-gradient(90deg, var(--primary), #ff8c42); color: white; font-weight: bold; padding: 12px 24px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-secondary { border: 1px solid var(--border); background: white; padding: 10px 20px; border-radius: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const money = (n) => '$' + (+(n || 0)).toFixed(2);
const calcHours = (s, e) => {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 1440;
  return Math.round(mins * 10 / 60) / 10;
};

const store = {
  get: (k) => JSON.parse(localStorage.getItem(k) || '[]'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// --- CSV EXPORT LOGIC ---
function downloadShiftsCSV(data, role) {
  if (!data || !data.length) return alert("No shifts to export.");

  // Headers defined exactly like your screenshot
  const headers = role === 'admin' 
    ? ["Date", "Staff Name", "Start Time", "End Time", "Hours", "Earned ($)"]
    : ["Date", "Start Time", "End Time", "Hours", "Earned ($)"];

  const rows = [];
  let totalHours = 0;
  let totalPay = 0;

  data.forEach(s => {
    totalHours += (s.hours || 0);
    totalPay += (s.earned || 0);
    
    // Explicitly mapping s.startTime and s.endTime to the CSV
    const row = role === 'admin'
      ? [s.date, s.userName, s.startTime || "N/A", s.endTime || "N/A", s.hours, s.earned.toFixed(2)]
      : [s.date, s.startTime || "N/A", s.endTime || "N/A", s.hours, s.earned.toFixed(2)];
    rows.push(row.map(v => `"${v}"`).join(","));
  });

  const totalRow = role === 'admin'
    ? ["TOTAL", "", "", "", totalHours.toFixed(2), totalPay.toFixed(2)]
    : ["TOTAL", "", "", totalHours.toFixed(2), totalPay.toFixed(2)];
  rows.push(totalRow.map(v => `"${v}"`).join(","));

  const csvContent = headers.join(",") + "\n" + rows.join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `Fire_Ice_Shifts_${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

const ADMIN_USER = { id: 'admin-root', name: 'Account Owner', email: 'admin', password: 'admin123', rate: 0, role: 'admin' };

function App() {
  const [user, setUser] = useState(JSON.parse(localStorage.getItem('session') || 'null'));
  const [view, setView] = useState('login'); 
  const [shifts, setShifts] = useState(store.get('shifts'));
  const [users, setUsers] = useState(store.get('users'));

  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [regPass, setRegPass] = useState('');
  const [regRate, setRegRate] = useState(15);
  const [logEmail, setLogEmail] = useState('');
  const [logPass, setLogPass] = useState('');

  const [startTime, setStartTime] = useState('18:00');
  const [endTime, setEndTime] = useState('23:00');
  const [shiftDate, setShiftDate] = useState(new Date().toISOString().split('T')[0]);

  const handleRegister = (e) => {
    e.preventDefault();
    if (regEmail.toLowerCase() === 'admin') return alert("Reserved username.");
    const newUser = { id: Date.now(), name: regName, email: regEmail.toLowerCase(), password: regPass, rate: Number(regRate), role: 'staff' };
    const updatedUsers = [...users, newUser];
    setUsers(updatedUsers);
    store.set('users', updatedUsers);
    setView('login');
  };

  const handleLogin = (e) => {
    e.preventDefault();
    const inputEmail = logEmail.toLowerCase();
    if (inputEmail === ADMIN_USER.email && logPass === ADMIN_USER.password) {
      setUser(ADMIN_USER);
      localStorage.setItem('session', JSON.stringify(ADMIN_USER));
      return;
    }
    const found = users.find(u => u.email === inputEmail && u.password === logPass);
    if (found) {
      setUser(found);
      localStorage.setItem('session', JSON.stringify(found));
    } else alert("Invalid credentials");
  };

  const addShift = () => {
    const hrsCalculated = calcHours(startTime, endTime);
    const newShift = { 
      id: Date.now(), 
      userId: user.id, 
      userName: user.name, 
      date: shiftDate, 
      startTime: startTime, // Crucial: Saving exactly as named
      endTime: endTime,     // Crucial: Saving exactly as named
      hours: hrsCalculated, 
      earned: hrsCalculated * user.rate 
    };
    const updated = [...shifts, newShift];
    setShifts(updated);
    store.set('shifts', updated);
    alert("Shift Logged!");
  };

  const deleteShift = (id) => {
    if(window.confirm("Delete?")) {
      const updated = shifts.filter(s => s.id !== id);
      setShifts(updated);
      store.set('shifts', updated);
    }
  };

  const visibleShifts = user?.role === 'admin' ? shifts : shifts.filter(s => s.userId === user?.id);

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div className="glass-card w-full max-w-md p-8 rounded-3xl">
          <div className="text-center mb-8">
            <h1 className="text-3xl font-extrabold text-slate-900">Fire & Ice</h1>
            <p className="text-slate-500">Staff Portal</p>
          </div>
          <div className="flex mb-6 bg-slate-100 p-1 rounded-xl">
            <button onClick={() => setView('login')} className={`flex-1 py-2 rounded-lg font-semibold ${view === 'login' ? 'bg-white shadow' : ''}`}>Login</button>
            <button onClick={() => setView('register')} className={`flex-1 py-2 rounded-lg font-semibold ${view === 'register' ? 'bg-white shadow' : ''}`}>Register</button>
          </div>
          {view === 'login' ? (
            <form onSubmit={handleLogin} className="space-y-4">
              <input type="text" placeholder="Username (admin) or Email" className="input-field" required onChange={e => setLogEmail(e.target.value)} />
              <input type="password" placeholder="Password" className="input-field" required onChange={e => setLogPass(e.target.value)} />
              <button className="shimmer-btn w-full">Sign In</button>
            </form>
          ) : (
            <form onSubmit={handleRegister} className="space-y-4">
              <input type="text" placeholder="Full Name" className="input-field" required onChange={e => setRegName(e.target.value)} />
              <input type="email" placeholder="Email" className="input-field" required onChange={e => setRegEmail(e.target.value)} />
              <input type="password" placeholder="Password" className="input-field" required onChange={e => setRegPass(e.target.value)} />
              <div className="space-y-1"><label className="text-xs font-bold text-slate-400">HOURLY RATE ($)</label><input type="number" className="input-field" value={regRate} onChange={e => setRegRate(e.target.value)} /></div>
              <button className="shimmer-btn w-full">Create Account</button>
            </form>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col md:flex-row bg-white">
      <aside className="w-full md:w-64 border-r border-slate-200 p-6 flex flex-col">
        <h2 className="text-xl font-extrabold mb-10 text-orange-600">FIRE & ICE</h2>
        <div className="flex-1 space-y-4">
          <div className="p-4 bg-orange-50 rounded-2xl">
            <p className="text-xs font-bold text-orange-400">LOGGED IN AS</p>
            <p className="font-bold text-slate-800">{user.name}</p>
            <p className="text-xs font-bold text-slate-500 uppercase mt-1">{user.role}</p>
          </div>
        </div>
        <button onClick={() => { localStorage.removeItem('session'); setUser(null); }} className="text-left text-sm font-bold text-slate-400 hover:text-red-500">SIGN OUT</button>
      </aside>

      <main className="flex-1 p-6 md:p-12 max-w-6xl">
        <div className="flex justify-between items-center mb-8">
          <h1 className="text-3xl font-extrabold">{user.role === 'admin' ? 'Master Records' : 'My Earnings'}</h1>
          <button onClick={() => downloadShiftsCSV(visibleShifts, user.role)} className="btn-secondary">📥 Export CSV</button>
        </div>
        
        {user.role !== 'admin' && (
          <div className="glass-card p-8 rounded-3xl mb-10">
            <h3 className="text-xl font-bold mb-6">Log New Shift</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
              <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400">DATE</label><input type="date" className="input-field" value={shiftDate} onChange={e => setShiftDate(e.target.value)} /></div>
              <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400">START</label><input type="time" className="input-field" value={startTime} onChange={e => setStartTime(e.target.value)} /></div>
              <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400">END</label><input type="time" className="input-field" value={endTime} onChange={e => setEndTime(e.target.value)} /></div>
            </div>
            <div className="bg-slate-50 p-4 rounded-2xl flex justify-between items-center">
              <button onClick={addShift} className="shimmer-btn">Submit Shift</button>
            </div>
          </div>
        )}

        <div className="glass-card rounded-3xl overflow-hidden">
          <table className="w-full text-left">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>
                <th className="p-4 text-xs font-bold text-slate-400">DATE</th>
                {user.role === 'admin' && <th className="p-4 text-xs font-bold text-slate-400">STAFF</th>}
                <th className="p-4 text-xs font-bold text-slate-400">START</th>
                <th className="p-4 text-xs font-bold text-slate-400">END</th>
                <th className="p-4 text-xs font-bold text-slate-400">HOURS</th>
                <th className="p-4 text-xs font-bold text-slate-400">PAY</th>
                <th className="p-4"></th>
              </tr>
            </thead>
            <tbody>
              {visibleShifts.slice().reverse().map(s => (
                <tr key={s.id} className="border-b border-slate-100 hover:bg-slate-50">
                  <td className="p-4 font-semibold">{s.date}</td>
                  {user.role === 'admin' && <td className="p-4 font-medium">{s.userName}</td>}
                  <td className="p-4 text-slate-500 font-mono text-sm">{s.startTime}</td>
                  <td className="p-4 text-slate-500 font-mono text-sm">{s.endTime}</td>
                  <td className="p-4 text-slate-500">{s.hours}h</td>
                  <td className="p-4 font-bold">{money(s.earned)}</td>
                  <td className="p-4 text-right">
                    <button onClick={() => deleteShift(s.id)} className="text-red-400 text-xs font-bold">Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
