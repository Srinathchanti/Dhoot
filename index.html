<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DHOOT – Shift Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8; --border-strong: #c8c6be;
    --text: #111110; --text-muted: #6b6a65; --text-hint: #9b9a95;
    --accent: #111110; --accent-fg: #ffffff;
    --blue-bg: #e6f1fb; --blue: #185fa5;
    --teal-bg: #e1f5ee; --teal: #0f6e56;
    --purple-bg: #eeedfe; --purple: #534ab7;
    --red: #a32d2d; --red-bg: #fcebeb;
    --green: #3b6d11; --green-bg: #eaf3de;
    --radius: 10px; --radius-lg: 14px; --radius-xl: 20px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* AUTH */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .auth-logo-icon {
    width: 40px; height: 40px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  }
  .auth-logo-text { font-size: 20px; font-weight: 600; letter-spacing: 0.06em; }
  .auth-tabs {
    display: flex; margin-bottom: 28px; border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .auth-tab {
    flex: 1; padding: 9px; font-size: 13.5px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: none; border: none; cursor: pointer; color: var(--text-muted); transition: all 0.15s;
  }
  .auth-tab.active { background: var(--accent); color: var(--accent-fg); }
  .auth-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .auth-sub { font-size: 13.5px; color: var(--text-muted); margin-bottom: 24px; }
  .auth-alert {
    border-radius: var(--radius); font-size: 13px; padding: 10px 13px; margin-bottom: 16px; display: none;
  }
  .auth-error { background: var(--red-bg); border: 1px solid #f7c1c1; color: var(--red); }
  .auth-success { background: var(--green-bg); border: 1px solid #c0dd97; color: var(--green); }
  .admin-hint { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-hint); text-align: center; }
  .admin-hint a { color: var(--text-muted); cursor: pointer; text-decoration: underline; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 18px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s; white-space: nowrap; border: none;
  }
  .btn-full { width: 100%; }
  .btn-dark { background: var(--accent); color: var(--accent-fg); }
  .btn-dark:hover { background: #2a2a28; }
  .btn-ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--text); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bg); }
  .btn-danger:hover { border-color: var(--red); }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  /* FORMS */
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block; font-size: 11.5px; font-weight: 600; color: var(--text-muted);
    margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 13px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.12s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { resize: vertical; min-height: 72px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

  /* NAV */
  #app { display: none; }
  .nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 62px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-logo-icon {
    width: 36px; height: 36px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  }
  .nav-logo-text { font-size: 17px; font-weight: 600; letter-spacing: 0.06em; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-user { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--text-muted); }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .role-badge { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; }
  .role-admin { background: var(--purple-bg); color: var(--purple); }
  .role-emp { background: var(--teal-bg); color: var(--teal); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 62px); }
  .sidebar {
    width: 230px; background: var(--surface); border-right: 1px solid var(--border);
    padding: 18px 10px; flex-shrink: 0; display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar-label { font-size: 10.5px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px 4px; }
  .emp-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: var(--radius); cursor: pointer; transition: background 0.12s;
    border: none; background: none; width: 100%; text-align: left;
    font-family: 'DM Sans', sans-serif; position: relative;
  }
  .emp-item:hover { background: var(--bg); }
  .emp-item.active { background: var(--bg); font-weight: 500; }
  .emp-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
  .emp-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 600; flex-shrink: 0; }
  .emp-name-txt { font-size: 13.5px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .emp-hrs { font-size: 11px; color: var(--text-hint); font-family: 'DM Mono', monospace; }
  .sidebar-bottom { border-top: 1px solid var(--border); margin-top: auto; padding-top: 10px; }

  /* MAIN */
  .main { flex: 1; padding: 32px; overflow-y: auto; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-sub { font-size: 13.5px; color: var(--text-muted); margin-top: 3px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); }
  .stat-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-val { font-size: 26px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 12px; margin-bottom: 32px; }
  .emp-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 16px; cursor: pointer; transition: all 0.12s; box-shadow: var(--shadow); text-align: center; }
  .emp-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .emp-card-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; margin: 0 auto 10px; }
  .emp-card-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .emp-card-role { font-size: 12px; color: var(--text-muted); }
  .emp-card-hours { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; margin-top: 10px; }
  .emp-card-shifts { font-size: 12px; color: var(--text-muted); }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .section-title { font-size: 15px; font-weight: 600; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* SHIFTS */
  .shifts-list { display: flex; flex-direction: column; gap: 10px; }
  .shift-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; display: flex; align-items: center; gap: 18px; box-shadow: var(--shadow); transition: border-color 0.12s; }
  .shift-card:hover { border-color: var(--border-strong); }
  .shift-date-block { text-align: center; min-width: 38px; }
  .shift-month { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .shift-day { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1.1; }
  .shift-divider { width: 1px; background: var(--border); height: 38px; flex-shrink: 0; }
  .shift-body { flex: 1; }
  .shift-time { font-size: 13.5px; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .shift-note { font-size: 12px; color: var(--text-muted); font-style: italic; }
  .shift-emp-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
  .shift-hours { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; min-width: 34px; text-align: right; }
  .shift-del { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 15px; padding: 4px 6px; border-radius: 6px; transition: all 0.12s; line-height: 1; }
  .shift-del:hover { color: var(--red); background: var(--red-bg); }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }
  .empty-state svg { opacity: 0.25; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 28px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.14); animation: modal-in 0.18s ease; }
  @keyframes modal-in { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

  /* COLORS */
  .c0{background:#e6f1fb;color:#185fa5} .c1{background:#e1f5ee;color:#0f6e56}
  .c2{background:#eeedfe;color:#534ab7} .c3{background:#faeeda;color:#854f0b}
  .c4{background:#fbeaf0;color:#993556} .c5{background:#eaf3de;color:#3b6d11}
  .c6{background:#faece7;color:#993c1d} .c7{background:#f1efe8;color:#5f5e5a}

  @media(max-width:700px){
    .sidebar{width:56px;} .emp-name-txt,.emp-hrs,.sidebar-label{display:none;}
    .main{padding:18px 14px;} .stats-grid{grid-template-columns:1fr;} .nav{padding:0 14px;}
    .nav-user span:not(.nav-avatar){display:none;}
  }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <span class="auth-logo-text">DHOOT</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your DHOOT account.</div>
      <div class="auth-alert auth-error" id="login-err"></div>
      <div class="form-row"><label>Username</label><input type="text" id="l-user" placeholder="your username" autocomplete="username"/></div>
      <div class="form-row"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn btn-dark btn-full" style="margin-top:6px;" onclick="doLogin()">Sign In</button>
      <div class="admin-hint">Admin? <a onclick="fillAdmin()">Use admin login</a></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none;">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Set up your employee profile and password.</div>
      <div class="auth-alert auth-error" id="signup-err"></div>
      <div class="auth-alert auth-success" id="signup-ok"></div>
      <div class="form-row"><label>Full Name</label><input type="text" id="s-name" placeholder="e.g. Sarah Johnson"/></div>
      <div class="form-row"><label>Role / Position</label><input type="text" id="s-role" placeholder="e.g. Barista, Server..."/></div>
      <div class="form-row"><label>Username</label><input type="text" id="s-user" placeholder="choose a username" autocomplete="username"/></div>
      <div class="form-row"><label>Password</label><input type="password" id="s-pass" placeholder="min 6 characters" autocomplete="new-password"/></div>
      <div class="form-row"><label>Confirm Password</label><input type="password" id="s-conf" placeholder="repeat password"/></div>
      <button class="btn btn-dark btn-full" style="margin-top:6px;" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <span class="nav-logo-text">DHOOT</span>
    </div>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar c0" id="nav-av"></div>
        <span id="nav-name"></span>
        <span class="role-badge" id="nav-badge"></span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="btn btn-dark btn-sm" onclick="openShiftModal(null)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Shift
      </button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar" style="display:none;">
      <div class="sidebar-label">Team</div>
      <button class="emp-item active" id="emp-all-btn" onclick="selectEmp('all')">
        <div class="emp-avatar c7">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <span class="emp-name-txt">All Employees</span>
      </button>
      <div id="sidebar-list"></div>
      <div class="sidebar-bottom">
        <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="doLogout()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- SHIFT MODAL -->
<div class="modal-overlay" id="shift-modal">
  <div class="modal">
    <div class="modal-title">Add Shift</div>
    <div class="form-row" id="emp-sel-row" style="display:none;">
      <label>Employee</label>
      <select id="shift-emp"></select>
    </div>
    <div class="form-row"><label>Date</label><input type="date" id="shift-date"/></div>
    <div class="two-col">
      <div class="form-row"><label>Start time</label><input type="time" id="shift-start"/></div>
      <div class="form-row"><label>End time</label><input type="time" id="shift-end"/></div>
    </div>
    <div class="form-row"><label>Notes (optional)</label><textarea id="shift-note" placeholder="e.g. closing shift, training..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeShiftModal()">Cancel</button>
      <button class="btn btn-dark" onclick="saveShift()">Save Shift</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin123'; // Change this!
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

// ── STATE ──
let db = loadDB();
let me = null;       // current logged-in user
let selEmp = 'all';  // selected employee in admin view

function loadDB() {
  try { return JSON.parse(localStorage.getItem('dhoot_db3') || '{"employees":[],"shifts":[]}'); }
  catch(e) { return {employees:[],shifts:[]}; }
}
function saveDB() { localStorage.setItem('dhoot_db3', JSON.stringify(db)); }

// ── UTILS ──
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function cc(i) { return 'c'+(i%8); }
function calcH(s,e) {
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  let m=(eh*60+em)-(sh*60+sm); if(m<0)m+=1440;
  return Math.round(m/10)/6;
}
function fmtH(h) { return (Math.round(h*10)/10)+'h'; }
function getWeekStart() { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d; }
function shiftsFor(id) { return id==='all'?db.shifts:db.shifts.filter(s=>s.empId===id); }
function totalH(arr) { return arr.reduce((a,s)=>a+s.hours,0); }
function weekH(arr) { const ws=getWeekStart(); return totalH(arr.filter(s=>new Date(s.date+'T00:00:00')>=ws)); }
function monthH(arr) { const n=new Date(); return totalH(arr.filter(s=>{const d=new Date(s.date+'T00:00:00');return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth();})); }
function empIdx(id) { return db.employees.findIndex(e=>e.id===id); }
function findEmp(id) { return db.employees.find(e=>e.id===id); }

// ── AUTH HELPERS ──
function switchTab(tab) {
  document.getElementById('tab-login').className='auth-tab'+(tab==='login'?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(tab==='signup'?' active':'');
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display=tab==='signup'?'block':'none';
}
function setErr(id,msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display=msg?'block':'none'; }
function setOk(id,msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display=msg?'block':'none'; }
function fillAdmin() { document.getElementById('l-user').value=ADMIN_USER; document.getElementById('l-pass').value=ADMIN_PASS; }

function doLogin() {
  setErr('login-err','');
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!u||!p){setErr('login-err','Please fill in all fields.');return;}
  if(u===ADMIN_USER&&p===ADMIN_PASS){me={name:'Admin',role:'admin',empId:null,username:ADMIN_USER};launchApp();return;}
  const emp=db.employees.find(e=>e.username===u);
  if(!emp){setErr('login-err','Username not found. Please sign up first.');return;}
  if(emp.password!==btoa(p)){setErr('login-err','Incorrect password.');return;}
  me={name:emp.name,role:'employee',empId:emp.id,username:emp.username};
  launchApp();
}

function doSignup() {
  setErr('signup-err',''); setOk('signup-ok','');
  const name=document.getElementById('s-name').value.trim();
  const role=document.getElementById('s-role').value.trim();
  const user=document.getElementById('s-user').value.trim().toLowerCase();
  const pass=document.getElementById('s-pass').value;
  const conf=document.getElementById('s-conf').value;
  if(!name||!user||!pass){setErr('signup-err','Name, username and password are required.');return;}
  if(pass.length<6){setErr('signup-err','Password must be at least 6 characters.');return;}
  if(pass!==conf){setErr('signup-err','Passwords do not match.');return;}
  if(user===ADMIN_USER){setErr('signup-err','That username is reserved.');return;}
  if(db.employees.find(e=>e.username===user)){setErr('signup-err','Username already taken.');return;}
  db.employees.push({id:Date.now().toString(),name,role,username:user,password:btoa(pass)});
  saveDB();
  setOk('signup-ok','✓ Account created! You can now log in.');
  ['s-name','s-role','s-user','s-pass','s-conf'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>switchTab('login'),1800);
}

function doLogout() {
  me=null; selEmp='all';
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
  setErr('login-err','');
}

function launchApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const i=me.empId?empIdx(me.empId):0;
  const av=document.getElementById('nav-av');
  av.textContent=initials(me.name); av.className='nav-avatar '+cc(i);
  document.getElementById('nav-name').textContent=me.name;
  const badge=document.getElementById('nav-badge');
  badge.textContent=me.role==='admin'?'Admin':'Employee';
  badge.className='role-badge '+(me.role==='admin'?'role-admin':'role-emp');
  const sb=document.getElementById('sidebar');
  sb.style.display=me.role==='admin'?'flex':'none';
  if(me.role==='employee') selEmp=me.empId;
  render();
}

// ── RENDER ──
function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  if(me?.role!=='admin') return;
  document.getElementById('emp-all-btn').className='emp-item'+(selEmp==='all'?' active':'');
  document.getElementById('sidebar-list').innerHTML=db.employees.map((emp,i)=>{
    const h=fmtH(totalH(shiftsFor(emp.id)));
    return `<button class="emp-item ${selEmp===emp.id?'active':''}" onclick="selectEmp('${emp.id}')">
      <div class="emp-avatar ${cc(i)}">${initials(emp.name)}</div>
      <span class="emp-name-txt">${emp.name}</span>
      <span class="emp-hrs">${h}</span>
    </button>`;
  }).join('');
}

function statBlock(shifts) {
  return `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--blue-bg)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#185fa5" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div><div><div class="stat-label">This Week</div><div class="stat-val">${fmtH(weekH(shifts))}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--teal-bg)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f6e56" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div><div><div class="stat-label">This Month</div><div class="stat-val">${fmtH(monthH(shifts))}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--purple-bg)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#534ab7" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
      </div><div><div class="stat-label">Total Tracked</div><div class="stat-val">${fmtH(totalH(shifts))}</div></div>
    </div>
  </div>`;
}

function shiftsList(shifts, showEmp) {
  if(!shifts.length) return `<div class="empty-state">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>No shifts yet. Click <strong>Add Shift</strong> to log your first shift.</p></div>`;
  return `<div class="shifts-list">${shifts.map(s=>{
    const d=new Date(s.date+'T00:00:00');
    const emp=findEmp(s.empId);
    const i=emp?empIdx(emp.id):0;
    const tag=showEmp&&emp?`<span class="shift-emp-tag ${cc(i)}">${emp.name}</span>`:'';
    const canDel=me?.role==='admin'||me?.empId===s.empId;
    return `<div class="shift-card">
      <div class="shift-date-block">
        <div class="shift-month">${MONTHS[d.getMonth()]}</div>
        <div class="shift-day">${d.getDate()}</div>
      </div>
      <div class="shift-divider"></div>
      <div class="shift-body">
        <div class="shift-time">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${s.start} → ${s.end}
        </div>
        <div class="shift-note">${s.note||'No notes provided'}</div>
      </div>
      ${tag}
      <div class="shift-hours">${fmtH(s.hours)}</div>
      ${canDel?`<button class="shift-del" onclick="deleteShift('${s.id}')" title="Remove">✕</button>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderMain() {
  const main=document.getElementById('main');
  if(me?.role==='admin') {
    selEmp==='all'?renderAll(main):renderEmpView(main,selEmp);
  } else {
    renderEmpView(main,me.empId);
  }
}

function renderAll(main) {
  const all=db.shifts;
  const cards=db.employees.length===0
    ?`<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p>No employees yet. Employees can sign up from the login screen.</p></div>`
    :`<div class="emp-grid">${db.employees.map((emp,i)=>{
        const sh=shiftsFor(emp.id);
        return `<div class="emp-card" onclick="selectEmp('${emp.id}')">
          <div class="emp-card-avatar ${cc(i)}">${initials(emp.name)}</div>
          <div class="emp-card-name">${emp.name}</div>
          <div class="emp-card-role">${emp.role||'Employee'}</div>
          <div class="emp-card-hours">${fmtH(totalH(sh))}</div>
          <div class="emp-card-shifts">${sh.length} shift${sh.length!==1?'s':''}</div>
        </div>`;
      }).join('')}</div>`;
  const recent=[...all].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  main.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">All Employees</div><div class="page-sub">Team-wide hours overview.</div></div>
    </div>
    ${statBlock(all)}
    ${cards}
    <div class="section-header">
      <div><div class="section-title">Recent Shifts</div><div class="section-sub">Latest shifts across the team.</div></div>
    </div>
    ${shiftsList(recent,true)}`;
}

function renderEmpView(main, empId) {
  const emp=findEmp(empId);
  if(!emp){if(me?.role==='admin')selectEmp('all');return;}
  const i=empIdx(empId);
  const shifts=shiftsFor(empId);
  const sorted=[...shifts].sort((a,b)=>b.date.localeCompare(a.date));
  const isAdmin=me?.role==='admin';
  main.innerHTML=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="emp-avatar ${cc(i)}" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;">${initials(emp.name)}</div>
        <div>
          <div class="page-title">${emp.name}</div>
          <div class="page-sub">${emp.role||'Employee'} · @${emp.username} · ${shifts.length} shift${shifts.length!==1?'s':''}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="removeEmployee('${emp.id}')">Remove Employee</button>`:''}
        <button class="btn btn-dark btn-sm" onclick="openShiftModal('${emp.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Shift
        </button>
      </div>
    </div>
    ${statBlock(shifts)}
    <div class="section-header">
      <div><div class="section-title">My Shifts</div><div class="section-sub">Full work history for ${emp.name}.</div></div>
    </div>
    ${shiftsList(sorted,false)}`;
}

// ── ACTIONS ──
function selectEmp(id) { selEmp=id; render(); }

function openShiftModal(preEmpId) {
  const isAdmin=me?.role==='admin';
  const row=document.getElementById('emp-sel-row');
  const sel=document.getElementById('shift-emp');
  if(isAdmin) {
    row.style.display='block';
    sel.innerHTML=db.employees.map(e=>`<option value="${e.id}">${e.name} (@${e.username})</option>`).join('');
    if(preEmpId&&preEmpId!=='all') sel.value=preEmpId;
    else if(selEmp!=='all') sel.value=selEmp;
  } else {
    row.style.display='none';
  }
  document.getElementById('shift-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('shift-start').value='';
  document.getElementById('shift-end').value='';
  document.getElementById('shift-note').value='';
  document.getElementById('shift-modal').classList.add('open');
}
function closeShiftModal() { document.getElementById('shift-modal').classList.remove('open'); }

function saveShift() {
  const isAdmin=me?.role==='admin';
  const empId=isAdmin?document.getElementById('shift-emp').value:me.empId;
  const date=document.getElementById('shift-date').value;
  const start=document.getElementById('shift-start').value;
  const end=document.getElementById('shift-end').value;
  const note=document.getElementById('shift-note').value.trim();
  if(!empId){alert('Please select an employee.');return;}
  if(!date||!start||!end){alert('Please fill in date, start, and end time.');return;}
  db.shifts.push({id:Date.now().toString(),empId,date,start,end,note,hours:calcH(start,end)});
  saveDB(); render(); closeShiftModal();
}

function deleteShift(id) {
  if(!confirm('Remove this shift?')) return;
  db.shifts=db.shifts.filter(s=>s.id!==id);
  saveDB(); render();
}

function removeEmployee(id) {
  const emp=findEmp(id);
  if(!confirm(`Remove ${emp?.name} and all their shifts?`)) return;
  db.employees=db.employees.filter(e=>e.id!==id);
  db.shifts=db.shifts.filter(s=>s.empId!==id);
  saveDB(); selEmp='all'; render();
}

function exportCSV() {
  const shifts=me?.role==='admin'?db.shifts:shiftsFor(me.empId);
  if(!shifts.length){alert('No shifts to export.');return;}
  const rows=['Employee,Username,Role,Date,Start,End,Hours,Notes'];
  [...shifts].sort((a,b)=>b.date.localeCompare(a.date)).forEach(s=>{
    const emp=findEmp(s.empId);
    rows.push(`"${emp?.name||''}","${emp?.username||''}","${emp?.role||''}",${s.date},${s.start},${s.end},${Math.round(s.hours*10)/10},"${s.note||''}"`);
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download='dhoot-shifts.csv'; a.click();
}

// Close modal on backdrop click
document.getElementById('shift-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('shift-modal'))closeShiftModal();
});

// Enter key on login/signup
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const auth=document.getElementById('auth-screen');
  if(auth.style.display==='none') return;
  if(document.getElementById('login-form').style.display!=='none') doLogin();
  else doSignup();
});
</script>
</body>
</html>
