<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fire & Ice — Luxury Staff Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root { --primary: #ff6b2b; --ice: #00d4ff; --bg: #ffffff; --text: #0f172a; --border: #e2e8f0; }
body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }

/* Holographic Luxury Border Card */
.lounge-card {
  background: white;
  border: 1px solid transparent;
  background-image: linear-gradient(white, white), linear-gradient(135deg, var(--primary), var(--ice));
  background-origin: border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 10px 40px rgba(0,0,0,0.04);
  border-radius: 24px;
}

/* coal-glow shimmer button */
.shimmer-btn {
  background: linear-gradient(90deg, var(--primary), #ff8c42, var(--ice), var(--primary));
  background-size: 300% auto;
  color: white;
  font-weight: 800;
  padding: 12px 28px;
  border-radius: 14px;
  animation: shimmer 5s infinite linear;
  transition: transform 0.2s;
}
.shimmer-btn:hover { transform: scale(1.02); }
.shimmer-btn:active { transform: scale(0.98); }

@keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

.input-field { background: #f1f5f9; border-radius: 12px; padding: 12px; width: 100%; outline: none; border: 1px solid transparent; transition: all 0.2s; }
.input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(255,107,43,0.1); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const money = (n) => '$' + (+(n || 0)).toFixed(2);
const calcHours = (s, e) => {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 1440;
  return Math.round(mins * 10 / 60) / 10;
};

const store = {
  get: (k) => JSON.parse(localStorage.getItem(k) || '[]'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// --- ENHANCED CSV EXPORT ---
function downloadShiftsCSV(data, role) {
  if (!data || !data.length) return alert("No shifts to export.");

  const headers = role === 'admin' 
    ? ["Date", "Staff Name", "Start Time", "End Time", "Vibe", "Hours", "Earned ($)"]
    : ["Date", "Start Time", "End Time", "Vibe", "Hours", "Earned ($)"];

  const rows = [];
  let totalH = 0; let totalP = 0;

  data.forEach(s => {
    totalH += s.hours; totalP += s.earned;
    const row = role === 'admin'
      ? [s.date, s.userName, s.startTime, s.endTime, s.vibe || 'N/A', s.hours, s.earned.toFixed(2)]
      : [s.date, s.startTime, s.endTime, s.vibe || 'N/A', s.hours, s.earned.toFixed(2)];
    rows.push(row.map(v => `"${v}"`).join(","));
  });

  const totalRow = role === 'admin' 
    ? ["TOTAL", "", "", "", "", totalH.toFixed(2), totalP.toFixed(2)]
    : ["TOTAL", "", "", "", totalH.toFixed(2), totalP.toFixed(2)];
  rows.push(totalRow.join(","));

  const csvContent = headers.join(",") + "\n" + rows.join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `Fire_Ice_Report_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}

const ADMIN_USER = { id: 'admin-root', name: 'Srinath (Owner)', email: 'admin', password: 'admin123', role: 'admin', rate: 0 };

function App() {
  const [user, setUser] = useState(JSON.parse(localStorage.getItem('session') || 'null'));
  const [view, setView] = useState('login'); 
  const [shifts, setShifts] = useState(store.get('shifts'));
  const [users, setUsers] = useState(store.get('users'));

  // Registration & Shift State
  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [regPass, setRegPass] = useState('');
  const [regRate, setRegRate] = useState(15);
  const [startTime, setStartTime] = useState('18:00');
  const [endTime, setEndTime] = useState('23:00');
  const [shiftDate, setShiftDate] = useState(new Date().toISOString().split('T')[0]);
  const [shiftVibe, setShiftVibe] = useState('❄️ Chill');

  const handleRegister = (e) => {
    e.preventDefault();
    if (regEmail.toLowerCase() === 'admin') return alert("Reserved.");
    const newUser = { id: Date.now(), name: regName, email: regEmail.toLowerCase(), password: regPass, rate: Number(regRate), role: 'staff' };
    const updated = [...users, newUser];
    setUsers(updated); store.set('users', updated);
    setView('login');
  };

  const handleLogin = (e) => {
    e.preventDefault();
    const em = document.getElementById('logEmail').value.toLowerCase();
    const ps = document.getElementById('logPass').value;
    if (em === ADMIN_USER.email && ps === ADMIN_USER.password) {
      setUser(ADMIN_USER); localStorage.setItem('session', JSON.stringify(ADMIN_USER));
      return;
    }
    const found = users.find(u => u.email === em && u.password === ps);
    if (found) { setUser(found); localStorage.setItem('session', JSON.stringify(found)); }
    else alert("Wrong credentials");
  };

  const addShift = () => {
    const hrs = calcHours(startTime, endTime);
    const newShift = { 
      id: Date.now(), userId: user.id, userName: user.name, date: shiftDate, 
      startTime, endTime, hours: hrs, earned: hrs * user.rate, vibe: shiftVibe 
    };
    const updated = [...shifts, newShift];
    setShifts(updated); store.set('shifts', updated);
    alert("Session Ignited!");
  };

  const deleteShift = (id) => { if(confirm("Delete record?")) { const u = shifts.filter(s => s.id !== id); setShifts(u); store.set('shifts', u); } };

  const visibleShifts = user?.role === 'admin' ? shifts : shifts.filter(s => s.userId === user?.id);
  const totalEarned = visibleShifts.reduce((a, b) => a + b.earned, 0);

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
        <div className="lounge-card w-full max-w-md p-10 text-center space-y-8">
          <div>
            <h1 className="text-4xl font-black tracking-tighter uppercase">Fire & <span className="text-cyan-400">Ice</span></h1>
            <p className="text-slate-400 text-sm mt-2">Lounge Commander Access</p>
          </div>
          
          <div className="flex bg-slate-100 p-1 rounded-xl">
            <button onClick={() => setView('login')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'login' ? 'bg-white shadow-sm' : ''}`}>Login</button>
            <button onClick={() => setView('register')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'register' ? 'bg-white shadow-sm' : ''}`}>Join Team</button>
          </div>

          {view === 'login' ? (
            <div className="space-y-4">
              <input id="logEmail" type="text" placeholder="Username (admin) or Email" className="input-field" />
              <input id="logPass" type="password" placeholder="Password" className="input-field" />
              <button onClick={handleLogin} className="shimmer-btn w-full">Ignite Portal</button>
            </div>
          ) : (
            <form onSubmit={handleRegister} className="space-y-4 text-left">
              <input type="text" placeholder="Full Name" className="input-field" required onChange={e => setRegName(e.target.value)} />
              <input type="email" placeholder="Email" className="input-field" required onChange={e => setRegEmail(e.target.value)} />
              <input type="password" placeholder="Password" className="input-field" required onChange={e => setRegPass(e.target.value)} />
              <input type="number" placeholder="Hourly Rate ($)" className="input-field" required onChange={e => setRegRate(e.target.value)} />
              <button className="shimmer-btn w-full">Create Profile</button>
            </form>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col md:flex-row">
      {/* SIDEBAR */}
      <aside className="w-full md:w-64 border-r border-slate-100 p-8 flex flex-col bg-white">
        <h2 className="text-2xl font-black tracking-tighter mb-12">FIRE & <span className="text-cyan-400">ICE</span></h2>
        <div className="flex-1 space-y-6">
          <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Profile</p>
            <p className="font-extrabold text-slate-800">{user.name}</p>
            <p className="text-xs text-orange-500 font-bold">{user.role.toUpperCase()}</p>
          </div>
        </div>
        <button onClick={() => { localStorage.removeItem('session'); setUser(null); }} className="text-left font-black text-red-400 hover:text-red-600 transition-colors">EXIT LOG ⏻</button>
      </aside>

      {/* MAIN */}
      <main className="flex-1 p-8 md:p-16 max-w-7xl">
        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
          <h1 className="text-4xl font-black tracking-tighter">{user.role === 'admin' ? 'THE PULSE' : 'MY SESSIONS'}</h1>
          <button onClick={() => downloadShiftsCSV(visibleShifts, user.role)} className="btn-secondary hover:border-orange-500 transition-all">📥 Export Excel Data</button>
        </header>

        {/* STATS */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
          <div className="lounge-card p-8 border-l-8 border-l-orange-500">
            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Total Earnings</p>
            <p className="text-5xl font-black text-slate-900">{money(totalEarned)}</p>
          </div>
          <div className="lounge-card p-8 border-l-8 border-l-cyan-500">
            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Shifts Completed</p>
            <p className="text-5xl font-black text-slate-900">{visibleShifts.length}</p>
          </div>
        </div>

        {/* LOG SHIFT - ONLY FOR STAFF */}
        {user.role !== 'admin' && (
          <div className="lounge-card p-10 mb-12 space-y-8">
            <h3 className="text-xl font-extrabold">Log Your Session Vibe</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <input type="date" className="input-field" value={shiftDate} onChange={e => setShiftDate(e.target.value)} />
              <div className="flex gap-2">
                <input type="time" className="input-field" value={startTime} onChange={e => setStartTime(e.target.value)} />
                <input type="time" className="input-field" value={endTime} onChange={e => setEndTime(e.target.value)} />
              </div>
              <div className="flex gap-2">
                {['❄️ Chill', '🔥 Busy', '🎉 Party'].map(v => (
                  <button key={v} onClick={() => setShiftVibe(v)} className={`flex-1 rounded-xl text-sm font-bold border transition-all ${shiftVibe === v ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-200'}`}>{v}</button>
                ))}
              </div>
            </div>
            <div className="flex justify-between items-center bg-orange-50 p-6 rounded-2xl border border-orange-100">
              <div>
                <p className="text-xs font-black text-orange-400 uppercase tracking-widest">Session Earnings</p>
                <p className="text-3xl font-black text-orange-600">{money(calcHours(startTime, endTime) * user.rate)}</p>
              </div>
              <button onClick={addShift} className="shimmer-btn">Ignite Shift</button>
            </div>
          </div>
        )}

        {/* TABLE */}
        <div className="lounge-card overflow-hidden">
          <table className="w-full text-left">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>
                <th className="p-6 text-[10px] font-black text-slate-400 uppercase">Date</th>
                {user.role === 'admin' && <th className="p-6 text-[10px] font-black text-slate-400 uppercase">Staff</th>}
                <th className="p-6 text-[10px] font-black text-slate-400 uppercase">Vibe</th>
                <th className="p-6 text-[10px] font-black text-slate-400 uppercase">Time Span</th>
                <th className="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Payout</th>
                <th className="p-6"></th>
              </tr>
            </thead>
            <tbody>
              {visibleShifts.slice().reverse().map(s => (
                <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50/80 transition-all">
                  <td className="p-6 font-bold">{s.date}</td>
                  {user.role === 'admin' && <td className="p-6 text-slate-600 font-medium">{s.userName}</td>}
                  <td className="p-6"><span className="px-3 py-1 bg-white border border-slate-100 rounded-full text-[10px] font-black">{s.vibe || '❄️ Chill'}</span></td>
                  <td className="p-6 text-slate-500 font-mono text-sm">{s.startTime} — {s.endTime} <span className="text-[10px] ml-1 bg-slate-100 px-1 rounded">({s.hours}h)</span></td>
                  <td className="p-6 font-black text-slate-900 text-right">{money(s.earned)}</td>
                  <td className="p-6 text-right"><button onClick={() => deleteShift(s.id)} className="text-slate-300 hover:text-red-400 font-bold transition-colors">×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
