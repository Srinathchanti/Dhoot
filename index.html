
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fire And Ice Hookah Lounge — Staff Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --fire:#ff6b2b;
  --fire2:#ffab3c;
  --ice:#00d4ff;
  --ice2:#06c2c2;
  --bg:#080b14;
  --bg2:#0d1120;
  --surface:rgba(255,255,255,0.05);
  --surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);
  --border2:rgba(255,255,255,0.18);
  --text:#f0f4ff;
  --text2:#94a3b8;
  --text3:#4a5568;

html,body,#root{height:100%;min-height:100vh;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,107,43,.4);border-radius:99px;}

.grad-text{background:linear-gradient(135deg,var(--fire),var(--fire2),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.grad-ice{background:linear-gradient(135deg,#00d4ff,#06c2c2);}

.glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);backdrop-filter:blur(20px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes toastIn{from{opacity:0;transform:translateX(110%);}to{opacity:1;transform:none;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}

.fade-up{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
.toast-in{animation:toastIn .35s cubic-bezier(.16,1,.3,1) both;}
.float{animation:float 4s ease-in-out infinite;}

.glow-fire{box-shadow:0 0 20px rgba(255,107,43,.25),0 0 60px rgba(255,107,43,.1);}
.glow-ice{box-shadow:0 0 20px rgba(0,212,255,.25),0 0 60px rgba(0,212,255,.1);}
.glow-btn:hover{box-shadow:0 4px 20px rgba(255,107,43,.45);}
.nav-active{background:linear-gradient(135deg,rgba(255,107,43,.15),rgba(0,212,255,.1));border:1px solid rgba(255,107,43,.3);}
.inp-focus:focus{border-color:rgba(255,107,43,.6)!important;box-shadow:0 0 0 3px rgba(255,107,43,.15)!important;}

.bg-mesh{background:radial-gradient(ellipse at 20% 20%,rgba(255,107,43,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,212,255,.08) 0%,transparent 60%),var(--bg);}
.shimmer-btn{background:linear-gradient(90deg,#ff6b2b,#ffab3c,#00d4ff,#ff6b2b);background-size:300% auto;animation:shimmer 3s linear infinite;}
.tr-hover:hover{background:rgba(255,255,255,0.03);}

.stat-fire-bg{background:linear-gradient(135deg,rgba(255,107,43,.15),rgba(255,171,60,.08));border:1px solid rgba(255,107,43,.2);}
.stat-ice-bg{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(6,194,194,.08));border:1px solid rgba(0,212,255,.2);}
.stat-purple-bg{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(168,85,247,.08));border:1px solid rgba(139,92,246,.2);}
.stat-green-bg{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(5,150,105,.08));border:1px solid rgba(16,185,129,.2);}

input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{cursor:pointer;filter:invert(1);opacity:.4;}
</style>
</head>
<body class="bg-mesh">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useContext,createContext,useCallback,useMemo,useRef} = React;

// ──────────── CONSTANTS & UTILS ────────────
const ADMIN = { id:'admin', name:'Admin', email:'admin@fireandicehookah.com', password:'admin123', role:'admin' };
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const EMP_COLORS   = ['#ff6b2b','#00d4ff','#8b5cf6','#10b981','#f59e0b','#ec4899','#06c2c2','#ffab3c'];

const payPeriodOf = (dateStr) => {
  if (!dateStr) return '';
  const [y,m,d] = dateStr.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  return d <= 15 ? `${y}-${String(m).padStart(2,'0')}-01-15` : `${y}-${String(m).padStart(2,'0')}-16-${lastDay}`;
};
const fmtPP = (pp) => {
  if (!pp) return '—';
  const parts = pp.split('-');
  return `${MONTHS_SHORT[parseInt(parts[1])-1]} ${parseInt(parts[2])}–${parseInt(parts[3])}, ${parts[0]}`;
};
const calcHours = (start, end) => {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh*60+em) - (sh*60+sm);
  if (mins <= 0) mins += 1440;
  return Math.round(mins * 10 / 60) / 10;
};
const nextPayday = () => {
  const now = new Date();
  const d = now.getDate(), m = now.getMonth(), y = now.getFullYear();
  const target = d <= 15 ? new Date(y,m,15) : new Date(y,m+1,0);
  const days = Math.max(0, Math.ceil((target - now) / 86400000));
  return { label: target.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), days };
};
const money = (n) => '$' + (+(n||0)).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const hrs = (h) => (Math.round((h||0)*10)/10) + 'h';
const uid = () => Math.random().toString(36).slice(2,10);
const curPP = () => payPeriodOf(new Date().toISOString().split('T')[0]);

// ──────────── STORAGE ────────────
const store = {
  get: (k,def=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ──────────── CSV EXPORT LOGIC (UPDATED FOR EXCEL) ────────────
function downloadCSV(rows, filename) {
  if (!rows || !rows.length) return false;
  const headers = Object.keys(rows[0]);
  const csvContent = [
    headers.join(','),
    ...rows.map(row => headers.map(h => {
      let val = row[h] === null || row[h] === undefined ? '' : row[h];
      // Escape quotes
      return `"${String(val).replace(/"/g, '""')}"`;
    }).join(','))
  ].join('\r\n');

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  return true;
}

// ──────────── CONTEXTS ────────────
const ToastCtx = createContext(null);
const AuthCtx  = createContext(null);
const DataCtx  = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type='success') => {
    const id = uid();
    setToasts(t => [...t.slice(-2), { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`toast-in flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl text-sm font-bold text-white pointer-events-auto ${t.type==='error'?'bg-red-600':'bg-orange-600'}`}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

// ──────────── DATA PROVIDER ────────────
function DataProvider({ children }) {
  const toast = useContext(ToastCtx);
  const [employees, setEmp] = useState(() => store.get('dh4_users', []).filter(u => u.role === 'employee'));
  const [shifts, setSh] = useState(() => store.get('dh4_shifts', []));
  const [payroll, setPr] = useState(() => store.get('dh4_payroll', []));

  const sync = (u, s, p) => {
    if(u){ store.set('dh4_users', [...u, ADMIN]); setEmp(u.filter(x=>x.role==='employee')); }
    if(s){ store.set('dh4_shifts', s); setSh(s); }
    if(p){ store.set('dh4_payroll', p); setPr(p); }
  };

  const addShift = (data) => {
    const ns = { id:'s'+uid(), ...data, hours:calcHours(data.startTime, data.endTime), payPeriod:payPeriodOf(data.date), locked:false };
    sync(null, [...shifts, ns], null);
    toast('Shift added!');
  };

  const editShift = (id, data) => {
    const ns = shifts.map(s => s.id===id ? {...s, ...data, hours:calcHours(data.startTime, data.endTime), payPeriod:payPeriodOf(data.date)} : s);
    sync(null, ns, null);
    toast('Shift updated!');
  };

  const delShift = (id) => {
    sync(null, shifts.filter(s=>s.id!==id), null);
    toast('Shift deleted');
  };

  const markPaid = (id) => {
    const updatedPr = payroll.map(p => p.id===id ? {...p, status:'paid'} : p);
    const p = updatedPr.find(x=>x.id===id);
    const updatedSh = shifts.map(s => (s.empId===p.empId && s.payPeriod===p.payPeriod) ? {...s, locked:true} : s);
    sync(null, updatedSh, updatedPr);
    toast('Marked as Paid');
  };

  const genPayroll = (pp) => {
    const existing = [...payroll];
    const ppShifts = shifts.filter(s => s.payPeriod === pp);
    const results = [];
    employees.filter(e=>e.status==='approved').forEach(emp => {
      const es = ppShifts.filter(s => s.empId === emp.id);
      if(!es.length) return;
      const totalH = es.reduce((a,s)=>a+s.hours, 0);
      const reg = Math.min(80, totalH), ot = Math.max(0, totalH-80);
      const pay = (reg * emp.hourlyRate) + (ot * emp.hourlyRate * 1.5);
      results.push({
        id: 'p'+uid(), empId: emp.id, empName: emp.name, payPeriod: pp,
        totalHours: totalH, regularHours: reg, overtimeHours: ot,
        hourlyRate: emp.hourlyRate, totalPay: pay, status: 'pending'
      });
    });
    const final = [...existing.filter(p=>p.payPeriod!==pp), ...results];
    sync(null, null, final);
    toast(`Payroll generated for ${results.length} staff`);
  };

  // UPDATED EXPORT FUNCTIONS FOR EXCEL CALCULATIONS
  const exportShifts = (list) => {
    const rows = list.map(s => {
      const emp = employees.find(e => e.id === s.empId);
      return {
        'Date': s.date,
        'Employee': emp?.name || 'Unknown',
        'Start': s.startTime,
        'End': s.endTime,
        'Hours Worked': s.hours, // RAW NUMBER
        'Pay Period': s.payPeriod,
        'Notes': s.notes || ''
      };
    });
    downloadCSV(rows, `shifts_export.csv`);
  };

  const exportPayroll = (list) => {
    const rows = list.map(p => ({
      'Employee': p.empName,
      'Pay Period': p.payPeriod,
      'Regular Hours': p.regularHours,   // RAW NUMBER
      'Overtime Hours': p.overtimeHours, // RAW NUMBER
      'Total Hours': p.totalHours,       // RAW NUMBER
      'Hourly Rate': p.hourlyRate,       // RAW NUMBER
      'Total Pay': p.totalPay,           // RAW NUMBER
      'Status': p.status
    }));
    downloadCSV(rows, `payroll_export.csv`);
  };

  return (
    <DataCtx.Provider value={{ employees, shifts, payroll, addShift, editShift, delShift, genPayroll, markPaid, exportShifts, exportPayroll, sync }}>
      {children}
    </DataCtx.Provider>
  );
}

// ──────────── COMPONENTS ────────────
const Btn = ({children, onClick, variant='primary', size='md', full=false, type="button"}) => {
  const base = `inline-flex items-center justify-center gap-2 font-bold rounded-xl transition-all active:scale-95 ${full?'w-full':''}`;
  const variants = {
    primary: 'shimmer-btn text-white glow-btn shadow-lg',
    secondary: 'glass text-slate-300 hover:text-white border-white/10',
    danger: 'bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20',
    success: 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/20'
  };
  const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-5 py-2.5 text-sm', lg: 'px-8 py-4 text-base' };
  return <button type={type} onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]}`}>{children}</button>;
};

const Stat = ({label, value, sub, icon, type='fire'}) => (
  <div className={`rounded-2xl p-5 border ${type==='fire'?'stat-fire-bg':'stat-ice-bg'}`}>
    <div className="flex justify-between items-start mb-4">
      <div className="w-10 h-10 rounded-xl grad-both flex items-center justify-center text-xl">{icon}</div>
    </div>
    <div className="text-2xl font-black text-white">{value}</div>
    <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">{label}</div>
    {sub && <div className="text-[10px] text-slate-600 mt-0.5">{sub}</div>}
  </div>
);

// ──────────── MAIN PAGES ────────────
function Dashboard() {
  const { user } = useContext(AuthCtx);
  const { shifts, payroll, employees } = useContext(DataCtx);
  const pp = curPP();
  const pd = nextPayday();
  
  const myShifts = user.role==='admin' ? shifts : shifts.filter(s=>s.empId===user.id);
  const curShifts = myShifts.filter(s=>s.payPeriod===pp);
  const totalHrs = curShifts.reduce((a,s)=>a+s.hours, 0);
  
  const curPay = user.role==='admin' 
    ? payroll.filter(p=>p.payPeriod===pp).reduce((a,p)=>a+p.totalPay, 0)
    : (payroll.find(p=>p.empId===user.id && p.payPeriod===pp)?.totalPay || 0);

  return (
    <div className="p-8 space-y-6 fade-up">
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <Stat icon="⏱" label="Hours This Period" value={hrs(totalHrs)} sub={`${curShifts.length} shifts found`} />
        <Stat icon="💵" label="Estimated Pay" value={money(curPay)} type="ice" sub="Gross before taxes" />
        <Stat icon="📅" label="Next Payday" value={pd.days + ' Days'} type="fire" sub={pd.label} />
        <Stat icon="👥" label="Team Size" value={employees.filter(e=>e.status==='approved').length} type="ice" sub="Active employees" />
      </div>
      
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="glass rounded-3xl p-6 border-white/5">
          <h3 className="text-lg font-black mb-4 flex items-center gap-2">⏱ Recent Shifts</h3>
          <div className="space-y-3">
            {myShifts.slice(-5).reverse().map(s => (
              <div key={s.id} className="flex justify-between items-center p-3 rounded-xl bg-white/5 border border-white/5">
                <div>
                  <div className="text-sm font-bold">{new Date(s.date).toLocaleDateString()}</div>
                  <div className="text-xs text-slate-500 font-mono">{s.startTime} - {s.endTime}</div>
                </div>
                <div className="text-orange-500 font-black">{hrs(s.hours)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function ShiftsPage() {
  const { user } = useContext(AuthCtx);
  const { shifts, delShift, employees, exportShifts } = useContext(DataCtx);
  const [modal, setModal] = useState(false);
  const isAdmin = user.role==='admin';
  const list = isAdmin ? shifts : shifts.filter(s=>s.empId===user.id);

  return (
    <div className="p-8 space-y-6 fade-up">
      <div className="flex justify-between items-center">
        <h2 className="text-2xl font-black font-[Cinzel]">Shift Log</h2>
        <div className="flex gap-2">
          <Btn variant="secondary" size="sm" onClick={()=>exportShifts(list)}>Download CSV</Btn>
          <Btn size="sm" onClick={()=>setModal(true)}>+ Add Shift</Btn>
        </div>
      </div>

      <div className="glass rounded-3xl overflow-hidden border-white/5">
        <table className="w-full text-left text-sm">
          <thead className="bg-white/5 text-slate-500 uppercase text-[10px] font-black tracking-widest">
            <tr>
              <th className="p-5">Date</th>
              {isAdmin && <th className="p-5">Staff</th>}
              <th className="p-5">Time</th>
              <th className="p-5">Duration</th>
              <th className="p-5">Status</th>
              <th className="p-5"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-white/5">
            {list.slice().reverse().map(s => (
              <tr key={s.id} className="hover:bg-white/5 transition-colors">
                <td className="p-5 font-bold">{s.date}</td>
                {isAdmin && <td className="p-5 text-slate-400">{employees.find(e=>e.id===s.empId)?.name}</td>}
                <td className="p-5 font-mono text-slate-400">{s.startTime} - {s.endTime}</td>
                <td className="p-5 font-black text-orange-500">{hrs(s.hours)}</td>
                <td className="p-5">
                   <span className={`px-2 py-1 rounded-md text-[10px] font-bold ${s.locked?'bg-slate-800 text-slate-500':'bg-emerald-500/10 text-emerald-500'}`}>
                    {s.locked ? '🔒 LOCKED' : '✓ ACTIVE'}
                   </span>
                </td>
                <td className="p-5 text-right">
                  {!s.locked && <button onClick={()=>delShift(s.id)} className="text-red-500 hover:text-red-400">Delete</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && <ShiftModal onClose={()=>setModal(false)} />}
    </div>
  );
}

function PayrollPage() {
  const { user } = useContext(AuthCtx);
  const { payroll, genPayroll, markPaid, exportPayroll } = useContext(DataCtx);
  const isAdmin = user.role === 'admin';
  const pp = curPP();
  const list = isAdmin ? payroll : payroll.filter(p=>p.empId===user.id);

  return (
    <div className="p-8 space-y-6 fade-up">
       <div className="flex justify-between items-center">
        <h2 className="text-2xl font-black font-[Cinzel]">Payroll</h2>
        <div className="flex gap-2">
          {isAdmin && <Btn variant="secondary" size="sm" onClick={()=>genPayroll(pp)}>Generate Current</Btn>}
          <Btn size="sm" onClick={()=>exportPayroll(list)}>Export for Excel</Btn>
        </div>
      </div>

      <div className="glass rounded-3xl overflow-hidden border-white/5">
        <table className="w-full text-left text-sm">
          <thead className="bg-white/5 text-slate-500 uppercase text-[10px] font-black tracking-widest">
            <tr>
              <th className="p-5">Period</th>
              {isAdmin && <th className="p-5">Staff</th>}
              <th className="p-5">Total Hrs</th>
              <th className="p-5">Gross Pay</th>
              <th className="p-5">Status</th>
              {isAdmin && <th className="p-5"></th>}
            </tr>
          </thead>
          <tbody className="divide-y divide-white/5">
            {list.slice().reverse().map(p => (
              <tr key={p.id}>
                <td className="p-5 font-bold">{fmtPP(p.payPeriod)}</td>
                {isAdmin && <td className="p-5">{p.empName}</td>}
                <td className="p-5 font-black">{hrs(p.totalHours)}</td>
                <td className="p-5 font-black text-emerald-500">{money(p.totalPay)}</td>
                <td className="p-5">
                   <span className={`px-2 py-1 rounded-md text-[10px] font-bold ${p.status==='paid'?'bg-emerald-500 text-white':'bg-orange-500/20 text-orange-500'}`}>
                    {p.status.toUpperCase()}
                   </span>
                </td>
                {isAdmin && (
                  <td className="p-5 text-right">
                    {p.status !== 'paid' && <Btn size="sm" variant="success" onClick={()=>markPaid(p.id)}>Mark Paid</Btn>}
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────── AUTH & SHELL ────────────
function AuthProvider({ children }) {
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('dh4_user')));
  const login = (e, p) => {
    if(e === 'admin' && p === 'admin123') {
      const u = ADMIN;
      localStorage.setItem('dh4_user', JSON.stringify(u));
      setUser(u);
      return true;
    }
    const emps = store.get('dh4_users');
    const u = emps.find(x => x.email === e && x.password === p);
    if(u && u.status === 'approved') {
      localStorage.setItem('dh4_user', JSON.stringify(u));
      setUser(u);
      return true;
    }
    return false;
  };
  const logout = () => { localStorage.removeItem('dh4_user'); setUser(null); };
  return <AuthCtx.Provider value={{ user, login, logout, setUser }}>{children}</AuthCtx.Provider>;
}

function ShiftModal({onClose}) {
  const { user } = useContext(AuthCtx);
  const { employees, addShift } = useContext(DataCtx);
  const [form, setForm] = useState({ 
    empId: user.role==='admin' ? '' : user.id,
    date: new Date().toISOString().split('T')[0],
    startTime: '18:00',
    endTime: '23:00'
  });

  const submit = (e) => {
    e.preventDefault();
    if(!form.empId) return alert('Select staff');
    addShift(form);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
      <form onSubmit={submit} className="glass w-full max-w-md rounded-3xl p-8 border-orange-500/20 space-y-4">
        <h2 className="text-xl font-black">Add New Shift</h2>
        {user.role === 'admin' && (
          <select className="w-full bg-white/5 border border-white/10 rounded-xl p-3" value={form.empId} onChange={e=>setForm({...form, empId: e.target.value})}>
            <option value="">Select Staff...</option>
            {employees.filter(e=>e.status==='approved').map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        )}
        <input type="date" className="w-full bg-white/5 border border-white/10 rounded-xl p-3" value={form.date} onChange={e=>setForm({...form, date: e.target.value})}/>
        <div className="grid grid-cols-2 gap-4">
          <input type="time" className="w-full bg-white/5 border border-white/10 rounded-xl p-3" value={form.startTime} onChange={e=>setForm({...form, startTime: e.target.value})}/>
          <input type="time" className="w-full bg-white/5 border border-white/10 rounded-xl p-3" value={form.endTime} onChange={e=>setForm({...form, endTime: e.target.value})}/>
        </div>
        <div className="flex gap-3 pt-4">
          <Btn variant="secondary" full onClick={onClose}>Cancel</Btn>
          <Btn type="submit" full>Save Shift</Btn>
        </div>
      </form>
    </div>
  );
}

function TeamPage() {
  const { employees, sync } = useContext(DataCtx);
  const approve = (id) => {
    const next = store.get('dh4_users').map(u => u.id===id ? {...u, status:'approved'}:u);
    sync(next, null, null);
  };

  return (
    <div className="p-8 space-y-6 fade-up">
      <h2 className="text-2xl font-black font-[Cinzel]">Team Management</h2>
      <div className="glass rounded-3xl overflow-hidden border-white/5">
        <table className="w-full text-left text-sm">
          <thead className="bg-white/5 text-slate-500 uppercase text-[10px] font-black tracking-widest">
            <tr>
              <th className="p-5">Name</th>
              <th className="p-5">Role</th>
              <th className="p-5">Rate</th>
              <th className="p-5">Status</th>
              <th className="p-5"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-white/5">
            {employees.map(e => (
              <tr key={e.id}>
                <td className="p-5 font-bold">{e.name}</td>
                <td className="p-5 text-slate-400">{e.jobTitle}</td>
                <td className="p-5 font-black text-orange-500">${e.hourlyRate}/hr</td>
                <td className="p-5">
                  <span className={`px-2 py-1 rounded-md text-[10px] font-bold ${e.status==='approved'?'bg-emerald-500/10 text-emerald-500':'bg-amber-500/10 text-amber-500'}`}>
                    {e.status.toUpperCase()}
                  </span>
                </td>
                <td className="p-5 text-right">
                  {e.status === 'pending' && <Btn size="sm" onClick={()=>approve(e.id)}>Approve</Btn>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const { user, login, logout } = useContext(AuthCtx);
  const [page, setPage] = useState('dashboard');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');

  if(!user) return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="glass w-full max-w-md rounded-[40px] p-10 border-orange-500/20 text-center space-y-8">
        <div>
          <div className="w-20 h-20 grad-both rounded-3xl flex items-center justify-center text-4xl mx-auto mb-4 glow-fire">🔥</div>
          <h1 className="text-3xl font-black font-[Cinzel]">Fire & Ice</h1>
          <p className="text-slate-500 text-sm">Staff Management Portal</p>
        </div>
        <div className="space-y-4">
          <input type="text" placeholder="Email / Username" className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-orange-500/50" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input type="password" placeholder="Password" className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-orange-500/50" value={pass} onChange={e=>setPass(e.target.value)}/>
          <Btn full size="lg" onClick={()=>login(email, pass)}>Sign In</Btn>
        </div>
        <p className="text-[10px] text-slate-700 uppercase tracking-widest">Admin: admin / admin123</p>
      </div>
    </div>
  );

  return (
    <div className="flex h-screen overflow-hidden">
      <aside className="w-64 bg-[#060810] border-r border-white/5 flex flex-col p-6">
        <div className="flex items-center gap-3 mb-10">
          <div className="w-10 h-10 grad-both rounded-xl flex items-center justify-center text-xl glow-fire">🔥</div>
          <span className="font-black font-[Cinzel] text-sm tracking-widest uppercase">Fire & Ice</span>
        </div>
        <nav className="flex-1 space-y-2">
          <button onClick={()=>setPage('dashboard')} className={`w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${page==='dashboard'?'bg-orange-500/10 text-orange-500':'text-slate-500 hover:text-white'}`}>Dashboard</button>
          <button onClick={()=>setPage('shifts')} className={`w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${page==='shifts'?'bg-orange-500/10 text-orange-500':'text-slate-500 hover:text-white'}`}>Shifts</button>
          <button onClick={()=>setPage('payroll')} className={`w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${page==='payroll'?'bg-orange-500/10 text-orange-500':'text-slate-500 hover:text-white'}`}>Payroll</button>
          {user.role === 'admin' && <button onClick={()=>setPage('team')} className={`w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${page==='team'?'bg-orange-500/10 text-orange-500':'text-slate-500 hover:text-white'}`}>Team</button>}
        </nav>
        <div className="pt-6 border-t border-white/5">
          <div className="text-xs font-bold text-white mb-1">{user.name}</div>
          <button onClick={logout} className="text-[10px] font-black text-slate-600 hover:text-red-500 uppercase tracking-widest transition-colors">Sign Out ⏻</button>
        </div>
      </aside>
      <main className="flex-1 overflow-y-auto bg-mesh">
        {page==='dashboard' && <Dashboard />}
        {page==='shifts' && <ShiftsPage />}
        {page==='payroll' && <PayrollPage />}
        {page==='team' && <TeamPage />}
      </main>
    </div>
  );
}

const Root = () => (
  <ToastProvider>
    <AuthProvider>
      <DataProvider>
        <App />
      </DataProvider>
    </AuthProvider>
  </ToastProvider>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
